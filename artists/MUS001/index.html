<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portale Artista</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0f1115" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Portale Artista" />
  <link rel="apple-touch-icon" href="../../icons/icon-192.png" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1115;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .box {
      max-width: 420px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      line-height: 1.5;
      color: #d7dbe2;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 12px;
      background: #d7b56d;
      color: #111;
      text-decoration: none;
      font-weight: bold;
    }

    .small {
      margin-top: 18px;
      font-size: 14px;
      color: #aab4c3;
    }
  </style>

  <script>
    const ID_ARTISTA = "MUS001";
    const TOKEN_ACCESSO = "506f9547c45244658afafb08478b84740373f751";

    function isStandaloneMode() {
      return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
    }

    function bootstrapInstalledApp() {
      localStorage.setItem("id_artista", ID_ARTISTA);
      localStorage.setItem("token_accesso", TOKEN_ACCESSO);
      localStorage.removeItem("artist");
      window.location.replace("../../index.html");
    }

    if (isStandaloneMode()) {
      bootstrapInstalledApp();
    }
  </script>
</head>
<body>
  <div class="box">
    <h1>Portale Artista</h1>
    <p>
      Per installare l’app su iPhone, premi <strong>Condividi</strong> e poi
      <strong>Aggiungi a Home</strong>.
    </p>
    <a class="btn" href="../../index.html?id_artista=MUS001&token=506f9547c45244658afafb08478b84740373f751">
      Apri il portale ora
    </a>
    <div class="small">
      Dopo l’installazione, l’icona salverà automaticamente l’accesso corretto.
    </div>
  </div>
</body>
</html>
