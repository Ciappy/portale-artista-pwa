<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Portale Artista</title>

  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Portale Artista" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="icons/icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">PORTALE ARTISTA</div>
    </header>

    <main class="container">
      <section class="hero-card">
        <h1 id="artistName">Caricamento...</h1>
        <p id="subtitle">Sto recuperando i dati dal portale.</p>
      </section>

      <section class="status-card" id="statusCard">
        <p id="statusText">Connessione in corso...</p>
      </section>

      <section class="events-section">
        <div class="tabs">
          <button id="tab-upcoming" class="tab-btn active" type="button">
            Prossimi eventi
          </button>
          <button id="tab-past" class="tab-btn" type="button">
            Passati
          </button>
        </div>

        <div id="upcoming-events" class="events-list tab-panel active"></div>
        <div id="past-events" class="events-list tab-panel"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
